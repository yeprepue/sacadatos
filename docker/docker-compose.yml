version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: github_pipeline_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sacadatos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sacadatos"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
  redis:
    image: redis:7-alpine
    container_name: github_pipeline_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  extractor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: github-extractor:latest
    container_name: github_extractor
    env_file:
      - .env
    volumes:
      - ../logs:/app/logs
      - ../src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
